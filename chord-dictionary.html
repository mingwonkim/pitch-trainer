<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>코드 사전 — K-POP 피아노</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;800&family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#131313;--sf:#1c1b1b;--sf2:#201f1f;--bd:#353535;
  --tx:#e5e2e1;--txd:#a08d88;--txl:#524340;
  --acc:#ffb4a2;--accd:rgba(255,180,162,.12);
  --ok:#2dd4a0;--okd:rgba(45,212,160,.1);
  --warm:#FF3B00;--warmd:rgba(255,59,0,.12);
  --pink:#ffb4a2;--pinkd:rgba(255,180,162,.1);
  --blue:#ffb4a2;--blued:rgba(255,180,162,.08);
  --red:#FF3B00;--redd:rgba(255,59,0,.1);
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow2:0 4px 20px rgba(0,0,0,.5);--r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);height:100dvh;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.app{max-width:960px;margin:0 auto;height:100%;display:flex;flex-direction:column;padding:0 16px;overflow:hidden;}
.hd{padding:20px 4px 14px;}.logo{font-size:18px;font-weight:900;font-family:'Space Grotesk',sans-serif;letter-spacing:-.3px;text-transform:uppercase;}.logo em{font-style:normal;color:var(--acc);font-size:10px;display:block;font-weight:500;letter-spacing:.15em;text-transform:uppercase;margin-top:2px;}
.tabs{display:flex;padding:4px;gap:4px;margin-bottom:16px;background:var(--sf2);border-radius:12px;border:1px solid var(--bd);}
.tb{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--txd);background:none;border:none;border-radius:10px;cursor:pointer;transition:.2s;font-family:'Noto Sans KR',sans-serif;}.tb.on{background:var(--sf);color:var(--acc);box-shadow:0 0 0 1px var(--bd);}
.sc{display:none;flex-direction:column;flex:1;padding:0 4px 30px;overflow-y:auto;}.sc.on{display:flex;}
.sh{font-size:14px;font-weight:800;color:var(--acc);margin:16px 0 10px;display:flex;align-items:center;gap:6px;}
.sh .badge{font-size:10px;background:var(--accd);color:var(--acc);padding:2px 8px;border-radius:6px;font-weight:700;}
.key-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.key-btn{padding:8px 12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:.15s;}.key-btn.on{border-color:var(--acc);background:var(--accd);color:var(--acc);}.key-btn:active{transform:scale(.95);}
.mode-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.mode-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--txd);font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.15s;}.mode-btn.on{border-color:var(--acc);background:var(--acc);color:#360e05;}
.chord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.cc{background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:.15s;position:relative;}.cc:active{transform:scale(.96);}.cc.playing{border-color:var(--acc);background:var(--accd);}
.cc .cn{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;margin-bottom:1px;}.cc .ct{font-size:10px;color:var(--txd);margin-bottom:2px;}.cc .cd{font-size:9px;color:var(--txl);font-family:'JetBrains Mono',monospace;}
.cc .dg{position:absolute;top:5px;right:6px;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;}
.sec-label{font-size:12px;font-weight:700;margin:14px 0 8px;padding:6px 12px;border-radius:8px;display:inline-block;}
.sec-label.mi{color:var(--ok);background:var(--okd);}.sec-label.sd{color:var(--pink);background:var(--pinkd);}.sec-label.pic{color:var(--ok);background:var(--okd);}
.pc{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);transition:.2s;}.pc.playing{border-color:var(--acc);}
.pc .pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.pc .pn{font-size:14px;font-weight:800;}.pc .pa{font-size:11px;color:var(--txd);}
.pc .pd{font-size:12px;color:var(--acc);font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:4px;}
.pc .pcs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}.pc .pch{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 10px;background:var(--sf2);border-radius:8px;}
.pc .ptags{display:flex;gap:3px;flex-wrap:wrap;}.pc .ptg{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;}
.ptg.t{background:var(--warmd);color:var(--warm);}.ptg.s{background:var(--accd);color:var(--acc);}.ptg.g{background:var(--pinkd);color:var(--pink);}
.pp{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--acc);background:var(--accd);color:var(--acc);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}.pp:active{transform:scale(.9);}.pp.on{background:var(--acc);color:#360e05;}
.bpm-label{font-size:10px;color:var(--txd);font-family:'JetBrains Mono',monospace;margin-left:6px;}
.si{width:100%;padding:10px 16px;border:1.5px solid var(--bd);border-radius:10px;background:var(--sf);color:var(--tx);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:12px;}.si:focus{border-color:var(--acc);}
.fr{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}.fc{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--txd);font-size:10px;font-weight:600;cursor:pointer;}.fc.on{border-color:var(--acc);background:var(--accd);color:var(--acc);}
.add-form{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);display:none;}.add-form.show{display:block;}
.add-form input{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;margin-bottom:8px;outline:none;background:var(--sf);color:var(--tx);}.add-form input:focus{border-color:var(--acc);}
.add-form .row{display:flex;gap:8px;}.add-form .row>*{flex:1;}
.abtn{padding:8px 18px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}.abtn.p{background:var(--acc);color:#360e05;}.abtn.s2{background:var(--sf2);color:var(--txd);border:1px solid var(--bd);margin-left:6px;}
.cof-wrap{display:flex;justify-content:center;padding:10px 0 16px;}.cof-svg{max-width:340px;width:100%;}
.cof-info{text-align:center;margin-bottom:12px;}.cof-info h3{font-size:16px;font-weight:800;margin-bottom:4px;}.cof-info p{font-size:12px;color:var(--txd);line-height:1.6;}
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.tc h3{font-size:15px;font-weight:800;margin-bottom:6px;}.tc p{font-size:12px;color:var(--txd);line-height:1.7;}
.tc .tp{display:inline-block;background:var(--accd);color:var(--acc);padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;margin-bottom:6px;}
.tc .ex{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin:8px 0;font-size:12px;line-height:1.7;color:var(--tx);}.tc .ex b{color:var(--acc);}
.empty{text-align:center;padding:40px 20px;color:var(--txd);font-size:13px;}
@media(max-width:400px){.chord-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr));}}
</style>
</head>
<body>
<div class="app">
<div class="hd"><div class="logo">CHORD DICTIONARY<em>K-POP · 코드진행 · 이론</em></div></div>
<div class="tabs">
  <button class="tb on" onclick="tab('chords')">코드</button>
  <button class="tb" onclick="tab('prog')">코드진행</button>
  <button class="tb" onclick="tab('circle')">5도권</button>
  <button class="tb" onclick="tab('theory')">이론</button>
</div>
<div class="sc on" id="sc-chords">
  <div class="sh">🎹 Key 선택</div><div class="key-sel" id="keySel"></div><div class="mode-row" id="modeRow"></div>
  <div class="sh">다이어토닉 <span class="badge" id="chordCount">-</span></div><div class="chord-grid" id="chordGrid"></div>
  <div id="borrowedSection"></div>
  <div id="famousProgs"></div>
</div>
<div class="sc" id="sc-prog">
  <div style="display:flex;gap:8px;margin-bottom:10px;"><input class="si" id="progSearch" placeholder="🔍 곡명, 아티스트, 코드..." oninput="rProgs()" style="margin:0;flex:1;"><button class="abtn p" onclick="toggleAdd()">+ 곡 추가</button></div>
  <div class="add-form" id="addForm">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;">곡 추가</div>
    <!-- AI Auto mode -->
    <div id="aiMode">
      <div style="font-size:12px;color:var(--txd);margin-bottom:8px;">곡 이름만 입력하면 AI가 코드진행을 자동 분석해요</div>
      <div class="row"><input id="ai_query" placeholder="곡 이름 + 아티스트 (예: Attention 뉴진스)" style="flex:3;"><button class="abtn p" onclick="aiAnalyze()" id="aiBtn" style="flex:1;white-space:nowrap;">🤖 AI 분석</button></div>
      <div id="aiStatus" style="font-size:11px;color:var(--txd);margin:6px 0;min-height:18px;"></div>
      <div id="aiResult" style="display:none;">
        <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--ok);">✅ 분석 완료 — 확인 후 저장하세요</div>
        <div class="row"><input id="af_name" placeholder="곡 이름"><input id="af_artist" placeholder="아티스트"></div>
        <div class="row"><input id="af_scale" placeholder="Key"><input id="af_bpm" placeholder="BPM" type="number"></div>
        <input id="af_deg" placeholder="디그리">
        <input id="af_chords" placeholder="코드 (쉼표 구분)">
        <input id="af_tags" placeholder="태그 (쉼표 구분)">
        <input id="af_top" placeholder="탑노트/메모">
        <div style="display:flex;gap:6px;margin-top:6px;"><button class="abtn p" onclick="addSong()">저장</button><button class="abtn s2" onclick="toggleAdd()">취소</button></div>
      </div>
      <div style="margin-top:8px;border-top:1px solid var(--bd);padding-top:8px;">
        <button class="abtn s2" onclick="showManual()" style="font-size:11px;">수동 입력으로 전환</button>
      </div>
    </div>
    <!-- Manual mode -->
    <div id="manualMode" style="display:none;">
      <div class="row"><input id="mf_name" placeholder="곡 이름"><input id="mf_artist" placeholder="아티스트"></div>
      <div class="row"><input id="mf_scale" placeholder="Key (예: Bb Major)"><input id="mf_bpm" placeholder="BPM" type="number"></div>
      <input id="mf_deg" placeholder="디그리 (예: IV - V - iii - vi)">
      <input id="mf_chords" placeholder="코드 쉼표 구분 (예: F,G,Em,Am)">
      <input id="mf_tags" placeholder="태그 쉼표 구분">
      <input id="mf_top" placeholder="탑노트/메모 (선택)">
      <div style="display:flex;gap:6px;margin-top:4px;"><button class="abtn p" onclick="addSongManual()">저장</button><button class="abtn s2" onclick="showAI()">AI 분석으로 전환</button><button class="abtn s2" onclick="toggleAdd()">취소</button></div>
    </div>
  </div>
  <div class="fr" id="progFilters"></div>
  <div class="sh">🎵 코드 진행 <span class="badge" id="progCount">-</span></div><div id="progList"></div>
</div>
<div class="sc" id="sc-circle">
  <div class="cof-info"><h3>⭕ 5도권 / 4도권</h3><p>시계=5도 상행(#추가) · 반시계=4도 상행(♭추가)<br>터치→다이어토닉 코드</p></div>
  <div class="cof-wrap"><svg class="cof-svg" viewBox="0 0 400 400" id="cofSvg"></svg></div><div id="cofDetail"></div>
</div>
<div class="sc" id="sc-theory"><div class="sh">📚 K-POP 필수 이론</div><div id="theoryList"></div></div>
</div>
<script>
const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENH={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
const FK=['F','Bb','Eb','Ab','Db','Gb'];

// ===== AUDIO ENGINE =====
const AC=new(window.AudioContext||window.webkitAudioContext)();
let _activeNodes=[]; // track all active oscillators for stopping

function stopAll(){
  _activeNodes.forEach(n=>{try{n.stop();n.disconnect();}catch(e){}});
  _activeNodes=[];
}

function mf(n,o){return 440*Math.pow(2,((o-4)*12+NN.indexOf(n)-9)/12);}

function playN(n,o,dur=1.5){
  if(AC.state==='suspended')AC.resume();
  const f=mf(n,o),t=AC.currentTime;

  // Master gain
  const m=AC.createGain();
  m.gain.setValueAtTime(0,t);
  m.gain.linearRampToValueAtTime(.20,t+.003);
  m.gain.exponentialRampToValueAtTime(.13,t+.06);
  m.gain.exponentialRampToValueAtTime(.05,t+.5);
  m.gain.exponentialRampToValueAtTime(.001,t+dur);
  m.connect(AC.destination);

  // Fundamental — sine (cleanest possible tone)
  const o1=AC.createOscillator();
  o1.type='sine';o1.frequency.value=f;
  o1.connect(m);o1.start(t);o1.stop(t+dur+.05);
  _activeNodes.push(o1);

  // Attack brightness — short burst of harmonics via waveshaper
  const o2=AC.createOscillator(),g2=AC.createGain();
  o2.type='sine';o2.frequency.value=f*2.01; // slight detune for shimmer
  g2.gain.setValueAtTime(.06,t);
  g2.gain.exponentialRampToValueAtTime(.001,t+.12);
  o2.connect(g2);g2.connect(m);
  o2.start(t);o2.stop(t+.15);
  _activeNodes.push(o2);

  // Sub — one octave below for body (low notes only)
  if(f<350){
    const os=AC.createOscillator(),gs=AC.createGain();
    os.type='sine';os.frequency.value=f/2;
    gs.gain.setValueAtTime(.04,t);
    gs.gain.exponentialRampToValueAtTime(.001,t+dur*.5);
    os.connect(gs);gs.connect(m);
    os.start(t);os.stop(t+dur*.5+.05);
    _activeNodes.push(os);
  }
}

function playV(v,dur=1.5){v.forEach(([n,o])=>playN(n,o,dur));}

let _seqTimer=null;
function playSeq(vs,bpm,cb){
  // Stop any previous sequence
  if(_seqTimer)clearTimeout(_seqTimer);
  stopAll();

  const cd=120/bpm;let i=0;
  function nx(){
    if(i>=vs.length){_seqTimer=null;if(cb)cb();return;}
    playV(vs[i],1.5);
    i++;_seqTimer=setTimeout(nx,cd*1000);
  }
  nx();
}

// Try loading Tone.js Sampler for real piano sound
let useSampler=false,sampler=null;
function tryLoadTone(){
  const script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js';
  script.onload=()=>{
    try{
      // Override console.log temporarily to suppress Tone.js banner
      const origLog=console.log;
      console.log=function(){};
      sampler=new Tone.Sampler({
        urls:{C4:'C4.mp3','D#4':'Ds4.mp3','F#4':'Fs4.mp3',A4:'A4.mp3'},
        release:1,
        baseUrl:'https://tonejs.github.io/audio/salamander/',
        onload:()=>{
          console.log=origLog;
          useSampler=true;
          // Override play functions with sampler versions
          window._origPlayN=playN;
          window._origPlayV=playV;
          playN=function(n,o,dur=1.5){
            if(Tone.context.state!=='running')Tone.start();
            sampler.triggerAttackRelease(n+o,dur);
          };
          playV=function(v,dur=1.5){
            if(Tone.context.state!=='running')Tone.start();
            sampler.triggerAttackRelease(v.map(([n,o])=>n+o),dur);
          };
        }
      }).toDestination();
      // If not loaded in 8 sec, restore console and give up
      setTimeout(()=>{console.log=origLog;},8000);
    }catch(e){}
  };
  script.onerror=()=>{};// silently fail, keep using synth
  document.head.appendChild(script);
}
tryLoadTone();

const NOTES=NN;function nn(i,fl){const n=NOTES[((i%12)+12)%12];return(fl&&ENH[n])?ENH[n]:n;}
const CT={'':  {iv:[0,4,7],l:'메이저'},'m': {iv:[0,3,7],l:'마이너'},'7': {iv:[0,4,7,10],l:'dom7'},'M7':{iv:[0,4,7,11],l:'M7'},'m7':{iv:[0,3,7,10],l:'m7'},'dim':{iv:[0,3,6],l:'dim'},'m7b5':{iv:[0,3,6,10],l:'m7♭5'}};
const MS=[0,2,4,5,7,9,11],mS=[0,2,3,5,7,8,10];
const MD=[{d:'I',t:'',l:'토닉'},{d:'ii',t:'m',l:'서브도미넌트'},{d:'iii',t:'m',l:'메디안트'},{d:'IV',t:'',l:'서브도미넌트'},{d:'V',t:'',l:'도미넌트'},{d:'vi',t:'m',l:'상대단조'},{d:'vii°',t:'dim',l:'이끎음'}];
const MD7=[{d:'IM7',t:'M7'},{d:'iim7',t:'m7'},{d:'iiim7',t:'m7'},{d:'IVM7',t:'M7'},{d:'V7',t:'7'},{d:'vim7',t:'m7'},{d:'viim7♭5',t:'m7b5'}];
const mD=[{d:'i',t:'m',l:'토닉'},{d:'ii°',t:'dim',l:''},{d:'III',t:'',l:'상대장조'},{d:'iv',t:'m',l:'서브도미넌트'},{d:'V',t:'',l:'도미넌트'},{d:'VI',t:'',l:''},{d:'VII',t:'',l:'서브토닉'}];
function gcn(r,tp,oct){const c=CT[tp]||CT[''];const ri=NOTES.indexOf(r);if(ri<0)return[];return c.iv.map(iv=>{const ni=(ri+iv)%12;return[NOTES[ni],oct+Math.floor((ri+iv)/12)];});}
function bkc(kr,mode,is7){const ri=NOTES.indexOf(kr);if(ri<0)return[];const fl=FK.includes(kr);const sc=mode==='major'?MS:mS;const dg=is7?(mode==='major'?MD7:MD):(mode==='major'?MD:mD);
  return dg.map((d,i)=>{const ni=(ri+sc[i])%12;const nm=nn(ni,fl);const tp=is7&&MD7[i]?MD7[i].t:d.t;const notes=gcn(NOTES[ni],tp,4);
    return{name:nm+(tp==='dim'?'dim':tp==='m'?'m':tp==='M7'?'M7':tp==='m7'?'m7':tp==='7'?'7':tp==='m7b5'?'m7♭5':''),root:NOTES[ni],type:tp,deg:d.d,label:d.l||'',notes,nms:notes.map(([n,o])=>(fl&&ENH[n]?ENH[n]:n)+o)};});}

function getBorrowed(kr,mode){const ri=NOTES.indexOf(kr);if(ri<0)return{mi:[],sd:[],pic:[]};const fl=FK.includes(kr);const b={mi:[],sd:[],pic:[]};
  if(mode==='major'){
    [{s:8,t:'',d:'bVI',desc:'몽환적 (마이너에서 빌림)'},{s:10,t:'',d:'bVII',desc:'웅장한 해결 (마이너에서 빌림)'},{s:5,t:'m',d:'iv',desc:'IV를 마이너로 → 슬픈 느낌'},{s:3,t:'',d:'bIII',desc:'밝은 전환'}].forEach(mc=>{
      const ni=(ri+mc.s)%12;const nm=nn(ni,fl);const notes=gcn(NOTES[ni],mc.t,4);
      b.mi.push({name:nm+(mc.t==='m'?'m':''),deg:mc.d,desc:mc.desc,notes,nms:notes.map(([n,o])=>(fl&&ENH[n]?ENH[n]:n)+o)});});
    [{s:9,t:'7',d:'V7/ii',desc:'→Dm(ii)으로 해결'},{s:11,t:'7',d:'V7/iii',desc:'→Em(iii)으로 해결'},{s:0,t:'7',d:'V7/IV',desc:'→F(IV)로 해결'},{s:2,t:'7',d:'V7/V',desc:'→G(V)로 해결'},{s:4,t:'7',d:'V7/vi',desc:'→Am(vi)으로 해결 ★자주씀'}].forEach(sd=>{
      const ni=(ri+sd.s)%12;const nm=nn(ni,fl);const notes=gcn(NOTES[ni],sd.t,4);
      b.sd.push({name:nm+'7',deg:sd.d,desc:sd.desc,notes,nms:notes.map(([n,o])=>(fl&&ENH[n]?ENH[n]:n)+o)});});
  } else {

// Parse chord name like "GbM7" → {root:'F#', type:'M7'}
function parseChord(ch){
  let r='',tp='';
  if(ch.length>=2&&(ch[1]==='#'||ch[1]==='b')){r=ch.substring(0,2);tp=ch.substring(2);}
  else{r=ch[0];tp=ch.substring(1);}
  const fts={'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
  const sr=fts[r]||r;
  let ct='';
  if(tp==='m7')ct='m7';else if(tp==='M7'||tp==='maj7'||tp==='9'||tp==='m9')ct='M7';
  else if(tp==='7'||tp==='7b9')ct='7';else if(tp==='m')ct='m';
  else if(tp==='dim')ct='dim';else if(tp==='m7b5')ct='m7b5';else ct='';
  return{root:sr,type:ct};
}
// Auto-generate voicing from chord name at octave 4 (same as chord tab)
function autoV(chordName){
  const{root,type}=parseChord(chordName);
  return gcn(root,type,4);
}

// Build voicings for a chord sequence with smooth bass movement
function buildVoicings(chordNames){
  let lastBass=null,lastTop=null;
  const NN_IDX={};NOTES.forEach((n,i)=>NN_IDX[n]=i);

  return chordNames.map((ch,ci)=>{
    const{root,type}=parseChord(ch);
    const ri=NN_IDX[root];if(ri===undefined)return autoV(ch);
    const ct=CT[type]||CT[''];
    const ivs=ct.iv;

    // === BASS: closest octave to previous bass (oct 2~4) ===
    let bassOct=3;
    if(lastBass!==null){
      let best=3,bestDist=999;
      for(let o=2;o<=4;o++){const d=Math.abs(ri+12*o-lastBass);if(d<bestDist){bestDist=d;best=o;}}
      bassOct=best;
    }
    lastBass=ri+12*bassOct;

    // === RIGHT HAND: find inversion where top note is closest to previous top ===
    // Generate all possible inversions in oct 3~5 range
    const upperIvs=ivs.slice(1); // chord tones minus root
    let bestRh=null,bestTopDist=999;

    for(let baseOct=3;baseOct<=5;baseOct++){
      const rh=upperIvs.map(iv=>{
        const ni=(ri+iv)%12;
        let o=baseOct;
        // If this note is below root pitch in the octave, push up
        if(ni<ri)o=baseOct+1;
        return[NOTES[ni],o];
      });
      // Top note = last element's midi value
      const topMidi=NN_IDX[rh[rh.length-1][0]]+12*rh[rh.length-1][1];

      if(lastTop===null){
        // First chord: prefer octave 4 range
        if(topMidi>=55&&topMidi<=72){bestRh=rh;bestTopDist=0;break;}
        const d=Math.abs(topMidi-64); // target ~E4
        if(d<bestTopDist){bestTopDist=d;bestRh=rh;}
      }else{
        const d=Math.abs(topMidi-lastTop);
        if(d<bestTopDist){bestTopDist=d;bestRh=rh;}
      }
    }

    if(!bestRh)bestRh=upperIvs.map(iv=>{const ni=(ri+iv)%12;return[NOTES[ni],4+Math.floor((ri+iv)/12)];});

    const topMidi=NN_IDX[bestRh[bestRh.length-1][0]]+12*bestRh[bestRh.length-1][1];
    lastTop=topMidi;

    console.log(ch,'bass:',root+bassOct,'top midi:',topMidi);
    return[[root,bassOct],...bestRh];
  });
}

async function aiAnalyze(){

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are a K-POP music theory expert. When given a song name, provide chord progression analysis. RESPOND ONLY IN THIS EXACT JSON FORMAT with no extra text:
{"name":"song name","artist":"artist","scale":"Key (e.g. Bb Major)","bpm":105,"deg":"bVIM7 - bVIIM7 - IM7","chords":["GbM7","AbM7","BbM7"],"tags":["모달인터체인지"],"top":"탑노트 설명","voicings":[[["Db",3],["F",3],["Gb",3],["Bb",3]],[["Eb",3],["G",3],["Ab",3],["C",4]],[["F",3],["A",3],["Bb",3],["D",4]]]}
voicings: array of chords, each chord is array of [noteName, octave] pairs representing piano voicing from bottom to top. Use proper voice leading with smooth top note movement. Use the CHORUS chord progression. Always use sharp note names (C#, not Db) in voicings array for technical accuracy, but display names can use flats.`,
        messages:[{role:'user',content:`이 곡의 코러스 코드진행을 분석해줘: ${query}`}]
      })
    });
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    // Parse JSON from response
    const jsonMatch=text.match(/\{[\s\S]*\}/);
    if(!jsonMatch)throw new Error('분석 결과를 파싱할 수 없어요');
    const result=JSON.parse(jsonMatch[0]);

    window._aiVoicings=result.voicings||null;

}

  const v=chords.map(ch=>{let r='',tp='';if(ch.length>=2&&(ch[1]==='#'||ch[1]==='b')){r=ch.substring(0,2);tp=ch.substring(2);}else{r=ch[0];tp=ch.substring(1);}const sr=fts[r]||r;let ct='';if(tp==='m7')ct='m7';else if(tp==='M7'||tp==='maj7')ct='M7';else if(tp==='7')ct='7';else if(tp==='m')ct='m';else if(tp==='dim')ct='dim';else ct='';return gcn(sr,ct,4);});
  userSongs.push({name,artist,scale,deg,chords,bpm,v,tags,top,user:true});
  localStorage.setItem('cd_us',JSON.stringify(userSongs));toggleAdd();showAI();
  ['mf_name','mf_artist','mf_scale','mf_bpm','mf_deg','mf_chords','mf_tags','mf_top'].forEach(id=>document.getElementById(id).value='');
  rProgs();
}
function rProgs(){
  const tags=new Set();getAllP().forEach(p=>p.tags?.forEach(t=>tags.add(t)));
  document.getElementById('progFilters').innerHTML=['all',...Array.from(tags).sort()].map(t=>`<button class="fc${t===curFilter?' on':''}" onclick="curFilter='${t}';rProgs()">${t==='all'?'전체':t}</button>`).join('');
  const q=(document.getElementById('progSearch').value||'').toLowerCase();
  let progs=getAllP();if(curFilter!=='all')progs=progs.filter(p=>p.tags?.includes(curFilter));
  if(q)progs=progs.filter(p=>(p.name+p.artist+(p.chords||[]).join('')+(p.deg||'')+(p.scale||'')).toLowerCase().includes(q));
  document.getElementById('progCount').textContent=progs.length+'곡';
  if(!progs.length){document.getElementById('progList').innerHTML='<div class="empty">🔍 검색 결과 없음</div>';return;}
  document.getElementById('progList').innerHTML=progs.map((p,i)=>`<div class="pc" id="pc${i}"><div class="pt"><div><div class="pn">${p.name}${p.user?'<span style="font-size:9px;color:var(--ok);margin-left:4px;">직접 추가</span>':''}<span class="bpm-label">${p.bpm||100} BPM</span></div><div class="pa">${p.artist||''} · ${p.scale||''}</div></div><div style="display:flex;gap:6px;">${p.user?`<button class="pp" onclick="event.stopPropagation();delU(${i})" style="border-color:var(--red);color:var(--red);background:var(--redd);font-size:10px;">✕</button>`:``}<button class="pp" onclick="event.stopPropagation();pProg(${i})" id="pp${i}">▶</button></div></div><div class="pd">${p.deg||''}</div><div class="pcs">${(p.chords||[]).map(c=>`<span class="pch">${c}</span>`).join('→')}</div>${p.top?`<div style="font-size:10px;color:var(--txd);margin:3px 0;">${p.top}</div>`:''}<div class="ptags">${(p.tags||[]).map(t=>`<span class="ptg ${t.includes('도미넌트')||t.includes('피카르디')||t.includes('패싱')||t.includes('모달')?'t':t.includes('메이저')||t.includes('마이너')?'s':'g'}">${t}</span>`).join('')}</div></div>`).join('');
  window._progs=progs;}
function delU(i){const p=window._progs[i];if(!p?.user||!confirm(p.name+' 삭제?'))return;userSongs=userSongs.filter(u=>u.name!==p.name||u.artist!==p.artist);localStorage.setItem('cd_us',JSON.stringify(userSongs));rProgs();}
let _pi=null;
function pProg(i){
  const p=window._progs[i];if(!p?.chords)return;
  // Stop previous
  if(_seqTimer){clearTimeout(_seqTimer);_seqTimer=null;}
  stopAll();
  if(_pi!==null){document.getElementById('pp'+_pi)?.classList.remove('on');document.getElementById('pc'+_pi)?.classList.remove('playing');}
  _pi=i;document.getElementById('pp'+i).classList.add('on');document.getElementById('pc'+i).classList.add('playing');
  const vs=buildVoicings(p.chords);
  playSeq(vs,p.bpm||100,()=>{document.getElementById('pp'+i)?.classList.remove('on');document.getElementById('pc'+i)?.classList.remove('playing');_pi=null;});}

// COF
const CM=['C','G','D','A','E','B','Gb','Db','Ab','Eb','Bb','F'];const Cm2=['Am','Em','Bm','F#m','C#m','G#m','Ebm','Bbm','Fm','Cm','Gm','Dm'];let cofSel=null;
function rCOF(){const svg=document.getElementById('cofSvg');const cx=200,cy=200,rO=155,rM=115;let h='';
  h+=`<circle cx="${cx}" cy="${cy}" r="${rO+12}" fill="none" stroke="#353535" stroke-width="1"/>`;h+=`<circle cx="${cx}" cy="${cy}" r="${rM+4}" fill="none" stroke="#353535" stroke-width="1" stroke-dasharray="3,3"/>`;
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;h+=`<line x1="${cx+Math.cos(a)*80}" y1="${cy+Math.sin(a)*80}" x2="${cx+Math.cos(a)*(rO+8)}" y2="${cy+Math.sin(a)*(rO+8)}" stroke="#eeedea" stroke-width="1"/>`;}
  h+=`<text x="${cx}" y="22" text-anchor="middle" fill="var(--acc)" font-size="10" font-weight="700" font-family="Noto Sans KR">5도 →</text>`;h+=`<text x="${cx}" y="392" text-anchor="middle" fill="var(--pink)" font-size="10" font-weight="700" font-family="Noto Sans KR">← 4도</text>`;
  CM.forEach((k,i)=>{const a=(i*30-90)*Math.PI/180;const x=cx+Math.cos(a)*rO,y=cy+Math.sin(a)*rO;const on=cofSel===k;h+=`<text x="${x}" y="${y+5}" text-anchor="middle" fill="${on?'var(--acc)':'var(--tx)'}" font-size="14" font-weight="${on?900:700}" font-family="JetBrains Mono" onclick="cofSel='${k}';rCOF()" style="cursor:pointer">${k}</text>`;});
  Cm2.forEach((k,i)=>{const a=(i*30-90)*Math.PI/180;const x=cx+Math.cos(a)*rM,y=cy+Math.sin(a)*rM;const on=cofSel===k;h+=`<text x="${x}" y="${y+4}" text-anchor="middle" fill="${on?'var(--pink)':'var(--txd)'}" font-size="10" font-weight="${on?700:400}" font-family="JetBrains Mono" onclick="cofSel='${k}';rCOF()" style="cursor:pointer">${k}</text>`;});
  h+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" fill="var(--txd)" font-size="10" font-weight="600">5도권</text>`;svg.innerHTML=h;
  const el=document.getElementById('cofDetail');if(!cofSel){el.innerHTML='<div class="empty">키를 터치하면 다이어토닉 코드</div>';return;}
  const isM=cofSel.endsWith('m');const root=isM?cofSel.replace('m',''):cofSel;const fts={'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};const sr=fts[root]||root;const ch=bkc(sr,isM?'minor':'major',false);const fl=FK.includes(root);
  el.innerHTML=`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-top:8px;box-shadow:var(--shadow);"><div style="font-size:15px;font-weight:800;margin-bottom:8px;">${cofSel} ${isM?'마이너':'메이저'}</div><div class="chord-grid">${ch.map(c=>`<div class="cc" onclick="playV([${c.notes.map(n=>`['${n[0]}',${n[1]}]`).join(',')}])"><span class="dg" style="background:var(--accd);color:var(--acc);">${c.deg}</span><div class="cn">${c.name}</div><div class="ct">${c.label}</div></div>`).join('')}</div><div style="font-size:11px;color:var(--txd);margin-top:8px;"><b>상대조:</b> ${isM?nn((NOTES.indexOf(sr)+3)%12,fl)+' Major':nn((NOTES.indexOf(sr)+9)%12,fl)+'m'}</div></div>`;}
