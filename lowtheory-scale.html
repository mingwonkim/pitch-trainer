<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>lowtheory® | Editorial Editable</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&amp;family=Inter:wght@400;500&amp;family=Work+Sans:wght@400;500&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "background": "#e5e1d3",
          "surface": "#e5e1d3",
          "surface-bright": "#ece7da",
          "surface-dim": "#d8d2c0",
          "surface-container": "#dcd7c4",
          "surface-container-low": "#dfdbca",
          "surface-container-high": "#d5cfbb",
          "surface-container-lowest": "#ffffff",
          "on-background": "#1b1c15",
          "on-surface": "#1b1c15",
          "primary": "#930009",
          "primary-container": "#b1231c",
          "secondary": "#8e6f54",
          "outline": "#b7a894",
          "outline-variant": "#dcc9b8",
          "paper": "#b39d7d",
          "paper-dark": "#9f896a",
          "tape-light": "#d9ceb7",
          "tape-dark": "#b9ab8f"
        },
        fontFamily: {
          "headline": ["Epilogue"],
          "body": ["Inter"],
          "label": ["Work Sans"]
        },
        boxShadow: {
          'paper': '0 20px 40px rgba(27, 28, 21, 0.06)',
          'paper-lg': '0 26px 56px rgba(27, 28, 21, 0.10)',
        }
      },
    },
  }
</script>
<style>
  body {
    background: #e5e1d3;
    color: #1b1c15;
  }

  .tape-texture {
    background: linear-gradient(180deg, rgba(229, 221, 198, 0.96) 0%, rgba(214, 205, 180, 0.94) 100%);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 1px 2px rgba(74, 60, 43, 0.12);
    border-left: 1px solid rgba(255,255,255,0.16);
    border-right: 1px solid rgba(120,100,75,0.08);
    opacity: 0.95;
  }

  .paper-board {
    background:
      radial-gradient(circle at 30% 28%, rgba(255,255,255,0.08), transparent 30%),
      radial-gradient(circle at 72% 64%, rgba(80, 55, 35, 0.06), transparent 34%),
      linear-gradient(180deg, rgba(184,161,129,0.95), rgba(171,149,117,0.96));
  }

  .paper-grain {
    position: relative;
    overflow: hidden;
  }

  .paper-grain::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.06), transparent 18%),
      radial-gradient(circle at 80% 35%, rgba(0,0,0,0.05), transparent 22%),
      radial-gradient(circle at 45% 80%, rgba(255,255,255,0.04), transparent 18%);
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  .footer-rule {
    border-top: 1px solid rgba(27, 28, 21, 0.22);
  }

  [data-editable].is-editing {
    outline: 2px dashed rgba(147, 0, 9, 0.5);
    outline-offset: 6px;
    background: rgba(255,255,255,0.2);
    cursor: text;
  }

  [data-image].is-editing {
    outline: 2px dashed rgba(147, 0, 9, 0.45);
    outline-offset: 8px;
    cursor: pointer;
    position: relative;
  }

  [data-image].is-editing::after {
    content: "클릭해서 사진 바꾸기";
    position: absolute;
    right: 12px;
    bottom: 12px;
    background: rgba(27, 28, 21, 0.78);
    color: white;
    font-family: Inter, sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  #editor-panel {
    backdrop-filter: blur(16px);
  }


  .copy-ribbon {
    background: linear-gradient(180deg, rgba(236, 231, 218, 0.72), rgba(223, 216, 201, 0.72));
  }

  .polaroid-copy {
    position: absolute;
    background: #ffffff;
    padding: 16px 16px 18px;
    box-shadow: 0 18px 40px rgba(27, 28, 21, 0.10);
  }

  .copy-stack::before {
    content: "";
    position: absolute;
    left: 124px;
    top: 12px;
    bottom: 12px;
    width: 2px;
    background: linear-gradient(180deg, rgba(147,0,9,0.00), rgba(147,0,9,0.25), rgba(147,0,9,0.00));
    pointer-events: none;
  }

  .copy-order-note {
    background: rgba(255,255,255,0.56);
    backdrop-filter: blur(8px);
  }

  .polaroid-copy .caption-rule {
    border-top: 1px solid rgba(147, 0, 9, 0.16);
  }


  .film-layout {
    align-items: start;
    position: relative;
  }

  .film-strip {
    position: relative;
    width: min(100%, 248px);
    background: linear-gradient(180deg, rgba(18,16,14,0.98), rgba(28,24,20,0.98));
    padding: 16px 24px;
    box-shadow: 0 22px 48px rgba(27, 28, 21, 0.16);
    overflow: visible;
    justify-self: end;
    align-self: start;
    z-index: 18;
    transform: none;
    align-self: stretch;
  }

  .film-tape {
    position: absolute;
    top: -4px;
    width: 74px;
    height: 24px;
    border-radius: 2px;
    background: linear-gradient(180deg, rgba(229, 221, 198, 0.98) 0%, rgba(214, 205, 180, 0.94) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.28),
      0 2px 6px rgba(74, 60, 43, 0.12);
    border-left: 1px solid rgba(255,255,255,0.16);
    border-right: 1px solid rgba(120,100,75,0.08);
    opacity: 0.95;
    pointer-events: none;
    z-index: 26;
  }

  .film-tape-left {
    left: 30px;
    transform: rotate(-8deg);
  }

  .film-tape-right {
    right: 30px;
    transform: rotate(7deg);
  }

  .film-strip.is-draggable {
    cursor: grab;
  }

  .film-strip.is-dragging,
  .film-strip.is-dragging * {
    cursor: grabbing !important;
    user-select: none !important;
  }

  .film-strip::before,
  .film-strip::after {
    content: "";
    position: absolute;
    top: 14px;
    bottom: 14px;
    width: 14px;
    background:
      repeating-linear-gradient(
        180deg,
        rgba(229,225,211,0.94) 0 12px,
        transparent 12px 26px
      );
    opacity: 0.9;
  }

  .film-strip::before { left: 7px; }
  .film-strip::after { right: 7px; }

  .film-track {
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: 100%;
  }

  .opening-composition {
    position: relative;
  }

  @media (min-width: 1025px) {
    .opening-composition {
      zoom: 0.7;
    }
  }

  @media (min-width: 1025px) {
    .film-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(204px, 16.5vw, 248px);
      column-gap: clamp(24px, 2.6vw, 42px);
      align-items: start;
    }

    .film-layout > .relative:first-child {
      min-width: 0;
      padding-right: 0;
    }

    .film-strip {
      position: relative;
      top: 0;
      right: 0;
      margin-top: 0 !important;
      width: clamp(204px, 16.5vw, 248px);
      justify-self: end;
      align-self: start;
    }
  }

  .film-chip {
    display: none !important;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 16px;
    padding: 7px 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: grab;
    touch-action: none;
  }

  .film-chip::after {
    content: 'drag';
    margin-left: 4px;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
  }

  .film-frame {
    width: 100%;
    padding: 8px 0 0;
    border-top: 1px solid rgba(255,255,255,0.12);
  }

  .film-frame:first-child {
    border-top: none;
    padding-top: 0;
  }

  .film-image-wrap {
    position: relative;
    width: 100%;
    padding: 8px;
    background: #0d0b09;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    isolation: isolate;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.03),
      inset 0 0 28px rgba(0,0,0,0.28);
  }

  .film-image-wrap::before {
    content: "";
    position: absolute;
    inset: 8px;
    background:
      linear-gradient(180deg, rgba(245,220,186,0.14), rgba(0,0,0,0.10) 38%, rgba(0,0,0,0.26)),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 3px),
      radial-gradient(circle at 20% 14%, rgba(255,255,255,0.14), transparent 28%),
      radial-gradient(circle at 84% 84%, rgba(0,0,0,0.28), transparent 34%);
    background-blend-mode: soft-light, normal, screen, multiply;
    mix-blend-mode: screen;
    opacity: 0.62;
    pointer-events: none;
    z-index: 1;
  }

  .film-image-wrap::after {
    content: "";
    position: absolute;
    inset: 8px;
    background: linear-gradient(180deg, rgba(16,12,10,0.08), rgba(10,8,7,0.28));
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.06),
      inset 0 0 34px rgba(0,0,0,0.34),
      inset 0 0 88px rgba(0,0,0,0.18);
    pointer-events: none;
    z-index: 2;
  }

  .film-image-wrap img {
    position: relative;
    z-index: 0;
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.7) contrast(1.12) brightness(0.9) sepia(0.16) hue-rotate(-8deg) grayscale(0.12);
    transform: scale(1.035);
  }

  .film-caption {
    margin-top: 7px;
    color: #d24e45;
    font-family: "Work Sans", sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    line-height: 1.45;
  }

  @media (max-width: 1024px) {
    .film-layout {
      gap: 2rem;
    }

    .film-layout > .relative:first-child {
      padding-right: 0;
    }

    .film-strip {
      position: relative;
      top: auto;
      right: auto;
      width: min(100%, 296px);
      margin-inline: auto;
    }
  }

  @media (max-width: 768px) {
    .copy-ribbon {
      padding-top: 2rem;
      padding-bottom: 2rem;
    }

    .copy-stack {
      height: auto !important;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      align-items: center;
    }

    .copy-stack::before {
      display: none;
    }

    .polaroid-copy {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      width: min(88vw, 340px) !important;
      height: auto !important;
    }

    .polaroid-copy .copy-image {
      height: 440px !important;
    }

    .copy-text-col {
      order: -1;
      padding-top: 0 !important;
    }
  }

  @media (max-width: 768px) {
    main section:first-child {
      height: auto !important;
    }
  }

  @media print {
    #editor-panel { display: none !important; }
    [data-editable], [data-image] { outline: none !important; }
  }

  /* film-strip 완전 제거, 메인 전체 너비 */



  main section:first-child { overflow: visible !important; }
  .opening-composition { overflow: visible !important; }
</style>

<script>
const STORAGE_KEY='lowtheory_editable_state_v10';
const editableNodes=[...document.querySelectorAll('[data-editable]')];
const imageNodes=[...document.querySelectorAll('[data-image]')];
let editMode=false,unlocked=false;

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='mk_unlock'){
    unlocked=e.data.value;
    const btn=document.getElementById('lt-edit-btn');
    if(btn)btn.style.display=unlocked?'flex':'none';
    if(!unlocked&&editMode)setEditMode(false);
  }
});

function getState(){
  const s={text:{},images:{}};
  editableNodes.forEach(n=>{s.text[n.dataset.editable]=n.innerHTML;});
  imageNodes.forEach(n=>{s.images[n.dataset.image]=n.getAttribute('src');});
  return s;
}
function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(getState()));}catch(e){}}
function applyState(s){
  if(!s)return;
  editableNodes.forEach(n=>{const k=n.dataset.editable;if(s.text&&typeof s.text[k]==='string')n.innerHTML=s.text[k];});
  imageNodes.forEach(n=>{const k=n.dataset.image;if(s.images&&typeof s.images[k]==='string')n.src=s.images[k];});
}
function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)applyState(JSON.parse(r));}catch(e){}}

const filmSourceMap={'photo-5':['copy-02'],'photo-1':['copy-03'],'photo-2':['copy-04'],'photo-4':['copy-05'],'hero':['copy-01']};
function syncFilm(k){
  const src=document.querySelector('[data-image="'+k+'"]');
  if(!src||!filmSourceMap[k])return;
  filmSourceMap[k].forEach(ck=>{const t=document.querySelector('[data-image="'+ck+'"]');if(t)t.src=src.getAttribute('src');});
}
function chooseImage(img){
  if(!editMode)return;
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{img.src=r.result;if(filmSourceMap[img.dataset.image])syncFilm(img.dataset.image);persist();};r.readAsDataURL(f);};
  inp.click();
}
function setEditMode(next){
  if(next&&!unlocked)return;
  editMode=next;
  const btn=document.getElementById('lt-edit-btn');
  if(btn){btn.textContent=editMode?'✓ 완료':'✎ 편집';btn.style.background=editMode?'rgba(255,180,162,.15)':'transparent';btn.style.borderColor=editMode?'#ffb4a2':'#353535';btn.style.color=editMode?'#ffb4a2':'#a08d88';}
  editableNodes.forEach(n=>{n.contentEditable=editMode?'true':'false';n.spellcheck=false;n.style.outline=editMode?'1.5px dashed rgba(255,180,162,.5)':'';n.style.cursor=editMode?'text':'';});
  imageNodes.forEach(n=>{n.style.cursor=editMode?'pointer':'';n.style.outline=editMode?'1.5px dashed rgba(255,180,162,.5)':'';n.tabIndex=editMode?0:-1;});
}
editableNodes.forEach(n=>{n.addEventListener('input',persist);n.addEventListener('blur',persist);});
imageNodes.forEach(n=>{n.addEventListener('click',()=>chooseImage(n));});
loadState();
setEditMode(false);
</script>

<script>

function sendHeight(){
  const h=document.documentElement.scrollHeight||document.body.scrollHeight;
  window.parent.postMessage({type:'lt_height',value:h},'*');
}
if(window.ResizeObserver){
  new ResizeObserver(sendHeight).observe(document.body);
}
window.addEventListener('load',sendHeight);
</script>
